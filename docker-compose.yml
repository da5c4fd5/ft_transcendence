name: capsul

services:
  certificate:
    build:
      context: ./docker/certs
    environment:
      DOMAIN: ${DOMAIN:-transcen.dence.fr}
      PROD: ${PROD:-false}
      TLS_MODE: ${TLS_MODE:-selfsigned}
    volumes:
      - ${ROOT_DIR:-./.capsul}/certs:/certs
    restart: "no"
    networks:
      - capsul_net

  postgres:
    image: docker.io/library/postgres:17-alpine
    depends_on:
      certificate:
        condition: service_completed_successfully
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-capsul}
      POSTGRES_USER: ${POSTGRES_USER:-capsul}
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
    secrets:
      - postgres_password
    command:
      - postgres
      - -c
      - ssl=on
      - -c
      - ssl_cert_file=/run/certs/internal/postgres.crt
      - -c
      - ssl_key_file=/run/certs/internal/postgres.key
      - -c
      - ssl_ca_file=/run/certs/internal/ca.crt
      - -c
      - ssl_min_protocol_version=TLSv1.2
      - -c
      - max_connections=80
      - -c
      - shared_buffers=256MB
      - -c
      - effective_cache_size=768MB
      - -c
      - maintenance_work_mem=128MB
      - -c
      - checkpoint_completion_target=0.9
      - -c
      - wal_buffers=16MB
      - -c
      - default_statistics_target=100
      - -c
      - random_page_cost=1.1
      - -c
      - effective_io_concurrency=200
      - -c
      - work_mem=8MB
      - -c
      - min_wal_size=512MB
      - -c
      - max_wal_size=2GB
    volumes:
      - ${ROOT_DIR:-./.capsul}/database:/var/lib/postgresql/data
      - ${ROOT_DIR:-./.capsul}/certs:/run/certs:ro
    networks:
      - capsul_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: ./backend
    depends_on:
      certificate:
        condition: service_completed_successfully
      mailpit:
        condition: service_started
      mood-classifier:
        condition: service_healthy
      ollama:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      HOST: 0.0.0.0
      PORT: 4242
      TLS_CERT_FILE: /run/certs/internal/backend.crt
      TLS_KEY_FILE: /run/certs/internal/backend.key
      POSTGRES_DB: ${POSTGRES_DB:-capsul}
      POSTGRES_USER: ${POSTGRES_USER:-capsul}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
      JWT_SECRET_FILE: /run/secrets/jwt_secret
      MFA_ENCRYPTION_KEY_FILE: /run/secrets/mfa_encryption_key
      MOOD_CLASSIFIER_URL: http://mood-classifier:8000
      MOOD_CLASSIFIER_MODEL_ID: ${MOOD_CLASSIFIER_MODEL_ID:-AnasAlokla/multilingual_go_emotions_V1.2}
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-alibayram/smollm3}
      SMTP_HOST: ${SMTP_HOST:-mailpit}
      SMTP_PORT: ${SMTP_PORT:-1025}
      SMTP_FROM: ${SMTP_FROM:-no-reply@capsul.local}
      PGSSLMODE: verify-full
      PGSSLROOTCERT: /run/certs/internal/ca.crt
      NODE_EXTRA_CA_CERTS: /run/certs/internal/ca.crt
      SSL_CERT_FILE: /run/certs/internal/ca.crt
    volumes:
      - ${ROOT_DIR:-./.capsul}/certs:/run/certs:ro
      - ${ROOT_DIR:-./.capsul}/media:/app/uploads
    secrets:
      - postgres_password
      - jwt_secret
      - mfa_encryption_key
    networks:
      - capsul_net

  mood-classifier:
    build:
      context: ./docker/mood-classifier
    environment:
      HF_HOME: /cache
      MOOD_CLASSIFIER_MODEL_ID: ${MOOD_CLASSIFIER_MODEL_ID:-AnasAlokla/multilingual_go_emotions_V1.2}
    expose:
      - "8000"
    volumes:
      - ${ROOT_DIR:-./.capsul}/mood-classifier:/cache
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - |
          import json, sys, urllib.request
          data = json.load(urllib.request.urlopen("http://127.0.0.1:8000/health", timeout=5))
          sys.exit(0 if data.get("ready") else 1)
      interval: 5s
      timeout: 5s
      retries: 60
      start_period: 5s
    networks:
      - capsul_net

  mailpit:
    image: ghcr.io/axllent/mailpit:latest
    expose:
      - "1025"
      - "8025"
    networks:
      - capsul_net

  ollama:
    build:
      context: ./docker/ollama
    environment:
      OLLAMA_MODEL: ${OLLAMA_MODEL:-alibayram/smollm3}
      OLLAMA_KEEP_ALIVE: ${OLLAMA_KEEP_ALIVE:--1}
      CUDA_VISIBLE_DEVICES: ${OLLAMA_CUDA_VISIBLE_DEVICES:-}
    expose:
      - "11434"
    volumes:
      - ${ROOT_DIR:-./.capsul}/ollama:/root/.ollama
    healthcheck:
      test:
        - CMD-SHELL
        - ollama show "$${OLLAMA_MODEL:-alibayram/smollm3}" >/dev/null 2>&1
      interval: 5s
      timeout: 5s
      retries: 60
      start_period: 5s
    networks:
      - capsul_net

  frontend:
    build:
      context: ./frontend
      args:
        DOMAIN: ${DOMAIN:-transcen.dence.fr}
        HTTPS_PORT: ${HTTPS_PORT:-443}
    networks:
      - capsul_net

  nginx:
    build:
      context: ./docker/nginx
    depends_on:
      certificate:
        condition: service_completed_successfully
      backend:
        condition: service_started
      frontend:
        condition: service_started
    environment:
      DOMAIN: ${DOMAIN:-transcen.dence.fr}
      PROD: ${PROD:-false}
      TLS_MODE: ${TLS_MODE:-selfsigned}
      HTTPS_PORT: ${HTTPS_PORT:-443}
      ACME_CONTACT_EMAIL: ${ACME_CONTACT_EMAIL:-}
      ACME_CA: ${ACME_CA:-letsencrypt}
      PDA_API_URL: ${PDA_API_URL:-}
      PDA_API_KEY_FILE: /run/secrets/powerdnsadmin_api_key
      PDA_SERVER_ID: ${PDA_SERVER_ID:-localhost}
      PDA_ZONE: ${PDA_ZONE:-}
      DNS_PROPAGATION_SECONDS: ${DNS_PROPAGATION_SECONDS:-30}
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ${ROOT_DIR:-./.capsul}/certs:/etc/nginx/certs
    secrets:
      - powerdnsadmin_api_key
    networks:
      - capsul_net

networks:
  capsul_net:

secrets:
  postgres_password:
    file: ./docker/secrets/postgres_password
  jwt_secret:
    file: ./docker/secrets/jwt_secret
  mfa_encryption_key:
    file: ./docker/secrets/mfa_encryption_key
  powerdnsadmin_api_key:
    file: ./docker/secrets/powerdnsadmin_api_key
