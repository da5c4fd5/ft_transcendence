name: capsul

services:
  certificate:
    image: alpine:3.22
    environment:
      DOMAIN: ${DOMAIN:-transcen.dence.fr}
      PROD: ${PROD:-false}
      TLS_MODE: ${TLS_MODE:-selfsigned}
    volumes:
      - certs:/certs
      - ./docker/certs:/scripts:ro
    command: sh -lc 'apk add --no-cache openssl >/dev/null && sh /scripts/generate.sh'
    restart: "no"

  postgres:
    image: postgres:17-alpine
    depends_on:
      certificate:
        condition: service_completed_successfully
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-capsul}
      POSTGRES_USER: ${POSTGRES_USER:-capsul}
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
    secrets:
      - postgres_password
    command:
      - postgres
      - -c
      - ssl=on
      - -c
      - ssl_cert_file=/run/certs/internal/postgres.crt
      - -c
      - ssl_key_file=/run/certs/internal/postgres.key
      - -c
      - ssl_ca_file=/run/certs/internal/ca.crt
      - -c
      - ssl_min_protocol_version=TLSv1.2
      - -c
      - max_connections=80
      - -c
      - shared_buffers=256MB
      - -c
      - effective_cache_size=768MB
      - -c
      - maintenance_work_mem=128MB
      - -c
      - checkpoint_completion_target=0.9
      - -c
      - wal_buffers=16MB
      - -c
      - default_statistics_target=100
      - -c
      - random_page_cost=1.1
      - -c
      - effective_io_concurrency=200
      - -c
      - work_mem=8MB
      - -c
      - min_wal_size=512MB
      - -c
      - max_wal_size=2GB
    volumes:
      - database:/var/lib/postgresql/data
      - certs:/run/certs:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: ./backend
    depends_on:
      certificate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    environment:
      HOST: 0.0.0.0
      PORT: 4242
      TLS_CERT_FILE: /run/certs/internal/backend.crt
      TLS_KEY_FILE: /run/certs/internal/backend.key
      POSTGRES_DB: ${POSTGRES_DB:-capsul}
      POSTGRES_USER: ${POSTGRES_USER:-capsul}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
      JWT_SECRET_FILE: /run/secrets/jwt_secret
      PGSSLMODE: verify-full
      PGSSLROOTCERT: /run/certs/internal/ca.crt
      NODE_EXTRA_CA_CERTS: /run/certs/internal/ca.crt
      SSL_CERT_FILE: /run/certs/internal/ca.crt
    volumes:
      - certs:/run/certs:ro
    secrets:
      - postgres_password
      - jwt_secret

  frontend:
    build:
      context: ./frontend

  nginx:
    build:
      context: ./docker/nginx
    depends_on:
      certificate:
        condition: service_completed_successfully
      backend:
        condition: service_started
      frontend:
        condition: service_started
    environment:
      DOMAIN: ${DOMAIN:-transcen.dence.fr}
      PROD: ${PROD:-false}
      TLS_MODE: ${TLS_MODE:-selfsigned}
      HTTPS_PORT: ${HTTPS_PORT:-443}
      ACME_CONTACT_EMAIL: ${ACME_CONTACT_EMAIL:-}
      ACME_CA: ${ACME_CA:-letsencrypt}
      PDA_API_URL: ${PDA_API_URL:-}
      PDA_API_KEY_FILE: /run/secrets/powerdnsadmin_api_key
      PDA_SERVER_ID: ${PDA_SERVER_ID:-localhost}
      PDA_ZONE: ${PDA_ZONE:-}
      DNS_PROPAGATION_SECONDS: ${DNS_PROPAGATION_SECONDS:-30}
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - certs:/etc/nginx/certs
    secrets:
      - powerdnsadmin_api_key

volumes:
  certs:
  database:

secrets:
  postgres_password:
    file: ./docker/secrets/postgres_password
  jwt_secret:
    file: ./docker/secrets/jwt_secret
  powerdnsadmin_api_key:
    file: ./docker/secrets/powerdnsadmin_api_key
